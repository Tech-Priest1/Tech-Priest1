name: Update GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Estatísticas Gerais & Idiomas (Substitui o GitHub Readme Stats)
      - name: General Stats & Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-general-stats.svg
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_ignored: html, css # Esconde linguagens muito básicas se quiser
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          config_timezone: America/Sao_Paulo

      # 2. O Calendário de Streak (O que configuramos antes)
      - name: Streak Streak
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-streak-stats.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: America/Sao_Paulo

      # 3. Conquistas/Badges (Substitui o GitHub Trophies por medalhas modernas)
      - name: GitHub Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B # Mostra medalhas de nível bronze para cima
          plugin_achievements_secrets: yes # Inclui conquistas secretas do GitHub
