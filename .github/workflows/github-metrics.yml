name: Update GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Estatísticas Gerais & Idiomas
      - name: General Stats & Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-general-stats.svg
          config_presets: tokyonight # 👈 O nome correto para carregar o tema
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          config_timezone: America/Sao_Paulo

      # 2. Calendário de Streak
      - name: Streak Streak
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-streak-stats.svg
          config_presets: tokyonight # 👈 O nome correto para carregar o tema
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: America/Sao_Paulo

      # 3. Conquistas/Badges
      - name: GitHub Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-achievements.svg
          config_presets: tokyonight # 👈 O nome correto para carregar o tema
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
