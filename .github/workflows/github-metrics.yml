name: Update GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Tokyo Night Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          
          config_timezone: America/Sao_Paulo

          extras_css: |
            svg { background: #1a1b26 !important; }
            h2, h3, .g-title, .achievement-title { color: #7aa2f7 !important; }
            .field .icon, .stat .icon { color: #bb9af3 !important; }
            text { fill: #a9b1d6 !important; }
            .calendar-day { fill: #24283b !important; }
